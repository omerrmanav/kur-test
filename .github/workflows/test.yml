name: Kur Güncelle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'   # UTC 05:00 (TR saatiyle 08:00)

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu al
        uses: actions/checkout@v7

      - name: Kuru çek
        run: curl -s "https://api.frankfurter.dev/v2/rates?base=USD&quotes=EUR,TRY" -o rates.json

      - name: README'yi güncelle
        run: |
          DATE=$(TZ='Europe/Istanbul' date +"%Y-%m-%d %H:%M")
          USD_EUR=$(jq -r '.[] | select(.quote=="EUR") | .rate' rates.json)
          USD_TRY=$(jq -r '.[] | select(.quote=="TRY") | .rate' rates.json)
          EUR_TRY=$(jq -n "$USD_TRY / $USD_EUR")
          export DATE USD_EUR USD_TRY EUR_TRY
          python3 << 'PYEOF'
          import os, re

          date = os.environ['DATE']
          usd_eur = os.environ['USD_EUR']
          usd_try = os.environ['USD_TRY']
          eur_try = os.environ['EUR_TRY']

          block = f"""<!-- KUR-BASLA -->
          **Son güncelleme:** {date} (TR saati)

          | Baz | Karşı | Kur |
          |-----|-------|-----|
          | USD | EUR   | {usd_eur} |
          | USD | TRY   | {usd_try} |
          | EUR | TRY   | {eur_try} (hesaplanmış) |
          <!-- KUR-BITIR -->"""

          with open('README.md') as f:
              content = f.read()

          if '<!-- KUR-BASLA -->' in content:
              new_content = re.sub(r'<!-- KUR-BASLA -->.*?<!-- KUR-BITIR -->', block, content, flags=re.DOTALL)
          else:
              new_content = content.rstrip() + '\n\n<!-- KUR-BASLA -->\n' + block + '\n<!-- KUR-BITIR -->\n'

          with open('README.md', 'w') as f:
              f.write(new_content)
          PYEOF

      - name: Değişikliği commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json README.md
          git diff --cached --quiet && echo "Değişiklik yok" || git commit -m "Kur güncelle: $(date -u +%Y-%m-%d)"
          git push
