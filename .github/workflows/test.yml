name: Kur Güncelle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'   # UTC 05:00 (08:00 Turkey time)

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Fetch rates
        run: curl -s "https://api.frankfurter.dev/v2/rates?base=USD&quotes=EUR,GBP,JPY,CNY,TRY" -o rates.json

      - name: Update README
        run: |
          DATE=$(TZ='Europe/Istanbul' date +"%Y-%m-%d %H:%M")
          export DATE
          python3 << 'PYEOF'
          import os, re, json

          date = os.environ['DATE']
          rates = {r['quote']: r['rate'] for r in json.load(open('rates.json'))}

          usd_eur = rates['EUR']
          usd_gbp = rates['GBP']
          usd_jpy = rates['JPY']
          usd_cny = rates['CNY']
          usd_try = rates['TRY']

          eur_try = usd_try / usd_eur
          gbp_try = usd_try / usd_gbp
          jpy_try = usd_try / usd_jpy
          cny_try = usd_try / usd_cny

          block = f"""<!-- KUR-BASLA -->
          **Last updated:** {date} (Turkey time)

          ### Top 5 Global Currencies (vs USD)

          | Currency | Code | Rate (per 1 USD) |
          |----------|------|-------------------|
          | US Dollar | USD | 1.0000 (base) |
          | Euro | EUR | {usd_eur:.4f} |
          | British Pound | GBP | {usd_gbp:.4f} |
          | Japanese Yen | JPY | {usd_jpy:.4f} |
          | Chinese Yuan | CNY | {usd_cny:.4f} |

          ### Turkish Lira (TRY) Cross Rates

          | From | To TRY |
          |------|--------|
          | 1 USD | {usd_try:.4f} |
          | 1 EUR | {eur_try:.4f} |
          | 1 GBP | {gbp_try:.4f} |
          | 1 JPY | {jpy_try:.4f} |
          | 1 CNY | {cny_try:.4f} |
          <!-- KUR-BITIR -->"""

          with open('README.md') as f:
              content = f.read()

          if '<!-- KUR-BASLA -->' in content:
              new_content = re.sub(r'<!-- KUR-BASLA -->.*?<!-- KUR-BITIR -->', block, content, flags=re.DOTALL)
          else:
              new_content = content.rstrip() + '\n\n' + block + '\n'

          with open('README.md', 'w') as f:
              f.write(new_content)
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.json README.md
          git diff --cached --quiet && echo "No changes" || git commit -m "Update rates: $(date -u +%Y-%m-%d)"
          git push
